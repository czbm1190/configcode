<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

    #hh-configurator {
        --bg-color: #ffffff;
        --sidebar-bg: #f8f8f8;
        --accent-color: #000000;
        --border-color: #e5e5e5;
        --text-main: #1a1a1a;
        --text-muted: #666666;

        font-family: 'Inter', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        height: 800px;
        max-height: 90vh;
        width: 100%;
        display: flex;
        flex-direction: column;
        border: 1px solid var(--border-color);
        overflow: hidden;
    }

    /* --- Top Navigation --- */
    #hh-configurator .top-bar {
        height: 70px;
        padding: 0 40px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border-color);
        background: #fff;
        z-index: 100;
    }

    #hh-configurator .brand-container {
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    #hh-configurator .brand-text {
        font-weight: 700;
        font-size: 18px;
        letter-spacing: -0.02em;
        text-transform: uppercase;
    }

    #hh-configurator .nav-tabs {
        display: flex;
        gap: 30px;
        height: 100%;
    }

    #hh-configurator .nav-tab {
        height: 100%;
        display: flex;
        align-items: center;
        font-size: 13px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--accent-color);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: all 0.3s ease;
    }

    #hh-configurator .nav-tab.active {
        color: var(--accent-color);
        border-bottom-color: var(--accent-color);
    }

    /* --- Main Layout --- */
    #hh-configurator .main-content-area {
        display: flex;
        flex: 1;
        overflow: hidden;
    }

    #hh-configurator .image-pane {
        flex: 1;
        background: radial-gradient(circle at center, #fff 0%, #f2f2f2 100%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: relative;
        padding: 40px;
    }

    #product-image {
        width: auto;
        height: 100%;
        max-height: 100%;
        object-fit: contain;
        transition: opacity 0.3s ease;
    }

    /* --- Scene Controls --- */
    #hh-configurator .scene-box {
        position: absolute;
        bottom: 40px;
        background: none;
        backdrop-filter: blur(10px);
        padding: 12px 24px;

        display: flex;
        gap: 20px;
    }

    #hh-configurator .scene-arrow {
        cursor: pointer;
        font-size: 18px;
        transition: transform 0.2s ease;

    }

    #hh-configurator .scene-arrow:hover {
        transform: scale(1.2);
    }

    #hh-configurator .scene-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #ccc;
        margin: auto 0;
        transition: all 0.3s ease;
    }

    #hh-configurator .scene-dot.active {
        background: var(--accent-color);
        transform: scale(1.5);
    }

    /* --- Options Pane (Sidebar) --- */
    #hh-configurator .options-pane {
        width: 400px;
        background: var(--sidebar-bg);
        border-left: 1px solid var(--border-color);
        overflow-y: auto;
        display: flex;
        flex-direction: column;
    }

    #hh-configurator .tab-content {
        padding: 40px;
    }

    #hh-configurator .section-label {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: var(--text-muted);
        margin-bottom: 25px;
        display: block;
    }

    /* --- Swatches & Cards --- */
    #hh-configurator .color-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
        margin-bottom: 40px;
    }

    #hh-configurator .color-swatch-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        cursor: pointer;
    }

    #hh-configurator .color-swatch {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        border: 1px solid rgba(0, 0, 0, 0.1);
        position: relative;
        transition: all 0.2s ease;
    }

    #hh-configurator .color-swatch-container.active .color-swatch {
        box-shadow: 0 0 0 2px var(--sidebar-bg), 0 0 0 4px var(--accent-color);
    }

    #hh-configurator .option-card {
        background: #fff;
        border: 1px solid var(--border-color);
        padding: 20px;
        margin-bottom: 12px;
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: all 0.2s ease;
    }

    #hh-configurator .option-card:hover {
        border-color: #aaa;
    }

    #hh-configurator .option-card.active {
        border-color: var(--accent-color);
        background: var(--accent-color);
        color: #fff;
    }

    #hh-configurator .option-card .price-tag {
        font-size: 12px;
        opacity: 0.7;
    }

    /* --- Pricing Tab --- */
    #hh-configurator .summary-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 15px;
        font-size: 14px;
    }

    #hh-configurator .total-box {
        margin-top: auto;
        padding: 30px;
        background: var(--accent-color);
        color: #fff;
        border-radius: 12px;
    }

    /* --- Mobile --- */
    @media (max-width: 900px) {
        #hh-configurator {
            height: auto;
            max-height: none;
        }

        #hh-configurator .main-content-area {
            flex-direction: column;
        }

        #hh-configurator .image-pane {
            height: 350px;
            width: 100%;
            position: sticky;
            top: 0;
        }

        #hh-configurator .options-pane {
            width: 100%;
        }

        #hh-configurator .top-bar {
            padding: 0 20px;
        }
    }
</style>

<div id="hh-configurator">
    <div class="top-bar">
        <div class="brand-container" id="brandDropdownContainer">
            <span class="brand-text" id="brandTextSpan">Buell</span>
            <span style="font-size: 10px;">&#9662;</span>
            <div class="brand-dropdown-content" id="brandDropdownContent"></div>
        </div>
        <div class="nav-tabs">
            <div class="nav-tab active" onclick="openNavTab('styleTab', event)">Configuration</div>
            <div class="nav-tab" onclick="openNavTab('accessoryTab', event)">Accessories</div>
            <div class="nav-tab" onclick="openNavTab('pricingTab', event)">Summary</div>
        </div>
    </div>

    <div class="main-content-area">
        <div class="image-pane">
            <img id="product-image" src="" alt="Build View">
            <div class="scene-box">
                <div class="scene-arrow" onclick="prevScene()">&#8592;</div>
                <div id="scene-dots" style="display: flex; gap: 8px;"></div>
                <div class="scene-arrow" onclick="nextScene()">&#8594;</div>
            </div>
        </div>

        <div class="options-pane">
            <!-- Style/Color Tab -->
            <div id="styleTab" class="tab-content tab-active">
                <span class="section-label">Select Exterior Color</span>
                <div class="color-grid" id="color-buttons"></div>

                <span class="section-label">Select Paint Scheme</span>
                <div id="style-buttons"></div>
            </div>

            <!-- Accessories Tab -->
            <div id="accessoryTab" class="tab-content tab-hidden">
                <span class="section-label">Performance & Aesthetic Upgrades</span>
                <div id="accessory-group"></div>
            </div>

            <!-- Pricing Tab -->
            <div id="pricingTab" class="tab-content tab-hidden"
                style="display: flex; flex-direction: column; height: 100%;">
                <span class="section-label">Build Summary</span>
                <div id="pricing-items" style="flex: 1;"></div>
                <div class="total-box">
                    <div style="font-size: 11px; text-transform: uppercase; opacity: 0.8; margin-bottom: 5px;">Estimated
                        MSRP</div>
                    <div id="price-total" style="font-size: 24px; font-weight: 700;">-</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    'use strict';
    const colorLabels = { RED: "Heritage Red", ORANGE: "Grabber Orange", TEAL: "Utah Blue", BLUE: "Deep Sea", PLUM: "Midnight Plum", GREY: "Urban Grey" };
    const colorMap = { RED: "#C4203B", ORANGE: "#FF9E1B", TEAL: "#5CCCC1", BLUE: "#18335B", PLUM: "#382150", GREY: "#797D7D" };
    const styleLabels = ["Pure Carbon", "Heritage Striping", "Apex Pattern", "Velocity Scheme"];
    const accessoriesData = [
        { label: "Black Out Kit", price: 450 },
        { label: "Öhlins Stabilizer", price: 800 },
        { label: "Quick Shift Kit", price: 650 },
        { label: "Race Exhaust", price: 1200 },
        { label: "Lower Pegs", price: 150 }
    ];

    let currentSet = 0;
    let currentScene = 0;
    let currentColor = "RED";
    let accessoryState = [0, 0, 0, 0, 0];
    let modelName = "Hammerhead 1190";

    function updateImage() {
        const accString = accessoryState.join('');
        const baseURL = "https://czbm1190.github.io/configimages/";
        const fileName = `HH_${currentSet}.${currentScene}.${accString} ${currentColor}.png`;
        document.getElementById('product-image').src = baseURL + encodeURI(fileName);
        updateSceneDots();
    }

    function renderColors() {
        const container = document.getElementById('color-buttons');
        container.innerHTML = '';
        Object.keys(colorMap).forEach(key => {
            const wrap = document.createElement('div');
            wrap.className = `color-swatch-container ${key === currentColor ? 'active' : ''}`;
            wrap.innerHTML = `<div class="color-swatch" style="background:${colorMap[key]}"></div>`;
            wrap.onclick = () => { currentColor = key; renderColors(); updateImage(); updatePricing(); };
            container.appendChild(wrap);
        });
    }

    function renderStyles() {
        const container = document.getElementById('style-buttons');
        container.innerHTML = '';
        styleLabels.forEach((label, i) => {
            const card = document.createElement('div');
            card.className = `option-card ${i === currentSet ? 'active' : ''}`;
            card.innerHTML = `<span>${label}</span><span class="price-tag">${i === 0 ? 'Standard' : '+$5,000'}</span>`;
            card.onclick = () => { currentSet = i; renderStyles(); updateImage(); updatePricing(); };
            container.appendChild(card);
        });
    }

    function renderAccessories() {
        const container = document.getElementById('accessory-group');
        container.innerHTML = '';
        accessoriesData.forEach((acc, i) => {
            const card = document.createElement('div');
            card.className = `option-card ${accessoryState[i] ? 'active' : ''}`;
            card.innerHTML = `<span>${acc.label}</span><span class="price-tag">+$${acc.price}</span>`;
            card.onclick = () => { accessoryState[i] = accessoryState[i] ? 0 : 1; renderAccessories(); updateImage(); updatePricing(); };
            container.appendChild(card);
        });
    }

    function updatePricing() {
        const base = 20995;
        const paint = currentSet === 0 ? 0 : 5000;
        const accTotal = accessoryState.reduce((sum, state, i) => sum + (state ? accessoriesData[i].price : 0), 0);

        const itemsHtml = `
            <div class="summary-row"><span>${modelName}</span><span>$${base.toLocaleString()}</span></div>
            <div class="summary-row"><span>${styleLabels[currentSet]} (${colorLabels[currentColor]})</span><span>$${paint.toLocaleString()}</span></div>
            <div class="summary-row"><span>Accessories</span><span>$${accTotal.toLocaleString()}</span></div>
        `;
        document.getElementById('pricing-items').innerHTML = itemsHtml;
        document.getElementById('price-total').innerText = `$${(base + paint + accTotal).toLocaleString()} USD`;
    }

    function updateSceneDots() {
        const container = document.getElementById('scene-dots');
        container.innerHTML = '';
        for (let i = 0; i < 3; i++) {
            const dot = document.createElement('div');
            dot.className = `scene-dot ${i === currentScene ? 'active' : ''}`;
            container.appendChild(dot);
        }
    }

    function openNavTab(tabId, e) {
        document.querySelectorAll('.tab-content').forEach(t => { t.classList.add('tab-hidden'); t.classList.remove('tab-active'); });
        document.getElementById(tabId).classList.replace('tab-hidden', 'tab-active');
        document.querySelectorAll('.nav-tab').forEach(n => n.classList.remove('active'));
        e.currentTarget.classList.add('active');
    }

    function prevScene() { currentScene = (currentScene - 1 + 3) % 3; updateImage(); }
    function nextScene() { currentScene = (currentScene + 1) % 3; updateImage(); }

    document.addEventListener('DOMContentLoaded', () => {
        renderColors();
        renderStyles();
        renderAccessories();
        updateImage();
        updatePricing();
    });
</script>
